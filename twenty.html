<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Investment Plans | CRYPTO HUB GROWTH INVESTMENT</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#06131f,#0b2240);
      color:#fff;
      min-height:100vh;
    }

    header{
      background:rgba(255,255,255,0.05);
      padding:20px;
      text-align:center;
      color:#00d9ff;
      font-size:1.5rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:rgba(0,0,0,0.25);
      flex-wrap:wrap;
      gap:10px;
    }

    .balance{
      color:#ffd700;
      font-size:1.1rem;
      font-weight:600;
    }

    .nav a{
      color:#00d9ff;
      text-decoration:none;
      margin-left:15px;
      font-weight:600;
    }

    .container{
      max-width:1450px;
      margin:auto;
      padding:20px;
    }

    h2{
      text-align:center;
      color:#00d9ff;
      margin-bottom:8px;
    }

    .sub{
      text-align:center;
      color:#c9d6f2;
      margin-bottom:25px;
      line-height:1.6;
    }

    .notification{
      max-width:800px;
      margin:0 auto 20px;
      padding:14px;
      border-radius:12px;
      text-align:center;
      display:none;
      background:rgba(255,255,255,0.08);
      font-weight:600;
      border:1px solid rgba(255,255,255,0.1);
    }

    .plans{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      display:flex;
      flex-direction:column;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:#00d9ff;
    }

    .gallery{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card-body{
      padding:20px;
      text-align:center;
    }

    .title{
      font-size:1.2rem;
      color:#00d9ff;
      font-weight:700;
      margin-bottom:10px;
    }

    .price{
      font-size:2rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .detail{
      color:#c9d6f2;
      margin-bottom:8px;
      line-height:1.6;
      font-size:0.95rem;
    }

    .timer{
      color:#ffcc00;
      font-weight:600;
      margin:12px 0;
      min-height:24px;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:30px;
      background:#00d9ff;
      color:#06131f;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .btn:hover{
      background:#fff;
    }

    .btn:disabled{
      opacity:0.65;
      cursor:not-allowed;
    }

    footer{
      text-align:center;
      padding:18px;
      margin-top:30px;
      color:#c9d6f2;
      background:rgba(0,0,0,0.25);
    }

    @media(max-width:768px){
      .top-bar{
        flex-direction:column;
        text-align:center;
      }

      .nav a{
        margin:0 8px;
      }
    }
  </style>
</head>
<body>

<header>CRYPTO HUB GROWTH INVESTMENT</header>

<div class="top-bar">
  <div class="balance" id="balance">Balance: $0.00</div>

  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">

  <h2>24-Hour Professional Investment Plans</h2>

  <div class="sub">
    Minimum starts at $30 • Each next plan increases by $25 • Higher plans earn higher profits • Auto receive after 24 hours
  </div>

  <div class="notification" id="notification"></div>

  <div class="plans" id="plansContainer"></div>

</div>

<footer>
  © 2026 CRYPTO HUB GROWTH INVESTMENT | All Rights Reserved
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
  authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
  databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crypto-hub-growth-invest-9492c",
  storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
  messagingSenderId: "946872117732",
  appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
  measurementId: "G-CLET27VD7J"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

/* ================= INVESTMENT PLANS ================= */
const plans = [
  {id:1,name:"Starter Plan",price:30,percent:10,image:"images/starter.jpg"},
  {id:2,name:"Bronze Plan",price:55,percent:15,image:"images/bronze.jpg"},
  {id:3,name:"Silver Plan",price:80,percent:20,image:"images/silver.jpg"},
  {id:4,name:"Gold Plan",price:105,percent:25,image:"images/gold.jpg"},
  {id:5,name:"Platinum Plan",price:130,percent:30,image:"images/platinum.jpg"},
  {id:6,name:"Diamond Plan",price:155,percent:35,image:"images/diamond.jpg"},
  {id:7,name:"Elite Plan",price:180,percent:40,image:"images/elite.jpg"}
];

/* ================= PURE NOTIFICATION ================= */
function notify(message,color="#00d9ff"){
  const box = document.getElementById("notification");
  box.style.display = "block";
  box.style.color = color;
  box.innerText = message;

  clearTimeout(box.hideTimer);
  box.hideTimer = setTimeout(()=>{
    box.style.display = "none";
  },4000);
}

/* ================= FORMAT TIMER ================= */
function formatTime(ms){
  if(ms <= 0) return "Profit Ready";

  const hrs = Math.floor(ms / (1000*60*60));
  const mins = Math.floor((ms % (1000*60*60)) / (1000*60));
  const secs = Math.floor((ms % (1000*60)) / 1000);

  return `${hrs}h ${mins}m ${secs}s`;
}

/* ================= BALANCE SYNC ================= */
function syncBalance(uid){
  db.ref("users/" + uid).on("value", snap=>{
    const data = snap.val() || {};
    const balance = Number(data.balance || 0);

    document.getElementById("balance").innerText =
      `Balance: $${balance.toFixed(2)}`;
  });
}

/* ================= RENDER PLANS ================= */
function renderPlans(investments={}){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan=>{

    const inv = investments[plan.id];

    let btnText = "Invest";
    let disabled = false;
    let timerText = `Return Amount: $${(plan.price + (plan.price * plan.percent/100)).toFixed(2)}`;

    if(inv){
      const remaining = (inv.startTime + 86400000) - Date.now();

      if(remaining <= 0){
        btnText = "Receive";
        timerText = `Return Ready: $${inv.returnAmount.toFixed(2)}`;
      }else{
        btnText = "Running";
        disabled = true;
        timerText = formatTime(remaining);
      }
    }

    const totalReturn = plan.price + (plan.price * plan.percent/100);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${plan.image}" alt="${plan.name}" class="gallery">

      <div class="card-body">
        <div class="title">${plan.name}</div>

        <div class="price">$${plan.price}</div>

        <div class="detail">
          Profit: ${plan.percent}%<br>
          Return Amount: $${totalReturn.toFixed(2)}<br>
          Duration: 24 Hours
        </div>

        <div class="timer">${timerText}</div>

        <button class="btn" ${disabled ? "disabled" : ""}>
          ${btnText}
        </button>
      </div>
    `;

    const btn = card.querySelector("button");
    btn.onclick = ()=>handlePlan(plan.id);

    container.appendChild(card);
  });
}

/* ================= HANDLE PLAN ================= */
function handlePlan(planId){
  const plan = plans.find(p=>p.id===planId);
  if(!plan || !currentUser) return;

  const userRef = db.ref("users/" + currentUser.uid);
  const investRef = db.ref("investments/" + currentUser.uid + "/" + planId);

  investRef.once("value").then(snap=>{
    const inv = snap.val();

    /* RECEIVE PROFIT */
    if(inv){
      const maturity = inv.startTime + 86400000;

      if(Date.now() < maturity){
        notify("Investment still running","#ffcc00");
        return;
      }

      const payout = inv.returnAmount;

      userRef.once("value").then(userSnap=>{
        const balance = Number(userSnap.val()?.balance || 0);

        userRef.update({
          balance: balance + payout,
          totalBalance: balance + payout
        }).then(()=>{
          investRef.remove();

          db.ref("transactions/" + currentUser.uid).push({
            type:"profit_received",
            plan:inv.name,
            amount:payout,
            createdAt:Date.now()
          });

          notify(`${inv.name}: $${payout.toFixed(2)} received`,"#00ff88");
        });
      });

      return;
    }

    /* INVEST */
    userRef.once("value").then(userSnap=>{
      const balance = Number(userSnap.val()?.balance || 0);

      if(balance < plan.price){
        notify("Insufficient balance","#ff4444");
        return;
      }

      userRef.update({
        balance: balance - plan.price,
        totalBalance: balance - plan.price
      }).then(()=>{

        investRef.set({
          name: plan.name,
          price: plan.price,
          percent: plan.percent,
          startTime: Date.now(),
          returnAmount: plan.price + (plan.price * plan.percent/100)
        });

        db.ref("transactions/" + currentUser.uid).push({
          type:"investment",
          plan:plan.name,
          amount:plan.price,
          createdAt:Date.now()
        });

        notify(`${plan.name} activated successfully`,"#00ff88");
      });
    });
  });
}

/* ================= AUTH ================= */
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  syncBalance(user.uid);

  db.ref("investments/" + user.uid).on("value", snap=>{
    renderPlans(snap.val() || {});
  });
});

/* ================= LIVE TIMER ================= */
setInterval(()=>{
  if(currentUser){
    db.ref("investments/" + currentUser.uid)
      .once("value")
      .then(snap=>{
        renderPlans(snap.val() || {});
      });
  }
},1000);
</script>

</body>
  </html>
