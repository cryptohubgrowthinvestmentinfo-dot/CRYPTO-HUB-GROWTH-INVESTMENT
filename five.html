<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Plans | CRYPTO HUB GROWTH INVESTMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#06131f,#0b2240);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  text-align:center;
  padding:22px;
  font-size:1.4rem;
  font-weight:700;
  color:#00d9ff;
  background:rgba(255,255,255,.05);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  color:#c9d6f2;
}

.nav a{
  color:#00d9ff;
  text-decoration:none;
  margin-left:15px;
  font-weight:600;
}

.container{
  flex:1;
  padding:20px;
  max-width:1300px;
  width:100%;
  margin:auto;
}

h2{
  text-align:center;
  color:#00d9ff;
  margin-bottom:10px;
}

.note{
  text-align:center;
  color:#c9d6f2;
  margin-bottom:20px;
}

.msg{
  max-width:900px;
  margin:0 auto 18px auto;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  text-align:center;
  min-height:22px;
  font-weight:600;
}

.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:20px;
  text-align:center;
}

.title{
  font-size:1.15rem;
  font-weight:700;
  color:#00d9ff;
  margin-bottom:8px;
}

.price{
  font-size:1.4rem;
  font-weight:700;
  margin-bottom:8px;
}

.detail{
  color:#c9d6f2;
  font-size:.92rem;
  margin-bottom:8px;
  line-height:1.6;
}

.timer{
  font-size:.9rem;
  color:#ffcc00;
  margin:10px 0;
  font-weight:600;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#00d9ff;
  color:#06131f;
  font-weight:700;
  cursor:pointer;
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

footer{
  text-align:center;
  padding:16px;
  background:rgba(0,0,0,.3);
  font-size:.82rem;
  color:#c9d6f2;
}
</style>
</head>
<body>

<header>CRYPTO HUB GROWTH INVESTMENT</header>

<div class="topbar">
  <div id="balanceDisplay">Total Balance: $0.00</div>
  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">
  <h2>24-Hour Investment Plans</h2>
  <div class="note">
    Minimum starts at $5. Every next plan increases by $25. Higher plans earn higher percentages.
  </div>

  <div class="msg" id="msg"></div>

  <div class="plans" id="plansContainer"></div>
</div>

<footer>© 2026 CRYPTO HUB GROWTH INVESTMENT | Investment Plans</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// =========================
// FIREBASE CONFIG
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
  authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
  databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crypto-hub-growth-invest-9492c",
  storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
  messagingSenderId: "946872117732",
  appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
  measurementId: "G-CLET27VD7J"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

// =========================
// PLANS
// =========================
const plans = [
  {id:1, name:"Starter", price:5, percent:5},
  {id:2, name:"Bronze", price:30, percent:10},
  {id:3, name:"Silver", price:55, percent:15},
  {id:4, name:"Gold", price:80, percent:20},
  {id:5, name:"Platinum", price:105, percent:25},
  {id:6, name:"Diamond", price:130, percent:30},
  {id:7, name:"Elite", price:155, percent:35}
];

let currentUser = null;
let userBalance = 0;

// =========================
// NOTIFICATION
// =========================
function notify(text, type="info"){
  const msg = document.getElementById("msg");
  msg.innerText = text;

  if(type === "success") msg.style.color = "#00ff88";
  else if(type === "error") msg.style.color = "#ff4d4d";
  else msg.style.color = "#ffcc00";
}

// =========================
// COUNTDOWN FORMAT
// =========================
function formatRemaining(ms){
  if(ms <= 0) return "Profit Ready";

  const hrs = Math.floor(ms / (1000*60*60));
  const mins = Math.floor((ms % (1000*60*60)) / (1000*60));
  const secs = Math.floor((ms % (1000*60)) / 1000);

  return `${hrs}h ${mins}m ${secs}s`;
}

// =========================
// RENDER PLANS
// =========================
function renderPlans(userPlans = {}){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan => {
    const active = userPlans[plan.id] || null;

    let buttonLabel = "Invest";
    let timerText = "Duration: 24 Hours";
    let disabled = false;

    if(active){
      const remaining = (active.startedAt + 86400000) - Date.now();

      if(remaining <= 0){
        buttonLabel = "Receive";
        timerText = "Profit Ready";
      }else{
        buttonLabel = "Running";
        timerText = "Remaining: " + formatRemaining(remaining);
        disabled = true;
      }
    }

    const totalReturn = plan.price + (plan.price * plan.percent / 100);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${plan.name} Plan</div>
      <div class="price">$${plan.price}</div>
      <div class="detail">
        Profit: ${plan.percent}% after 24 hours<br>
        Total Return: $${totalReturn.toFixed(2)}
      </div>
      <div class="timer">${timerText}</div>
      <button class="btn" ${disabled ? "disabled" : ""}>${buttonLabel}</button>
    `;

    const btn = card.querySelector("button");

    if(buttonLabel === "Invest"){
      btn.onclick = () => investPlan(plan.id);
    }

    if(buttonLabel === "Receive"){
      btn.onclick = () => receiveProfit(plan.id);
    }

    container.appendChild(card);
  });
}

// =========================
// LOAD USER
// =========================
function loadUserData(uid){
  db.ref("users/" + uid).on("value", snap => {
    const data = snap.val() || {};
    userBalance = Number(data.balance || 0);

    document.getElementById("balanceDisplay").innerText =
      `Total Balance: $${userBalance.toFixed(2)}`;
  });

  db.ref("investments/" + uid).on("value", snap => {
    renderPlans(snap.val() || {});
  });
}

// =========================
// INVEST
// =========================
function investPlan(planId){
  const plan = plans.find(p => p.id === planId);

  if(userBalance < plan.price){
    notify(`Insufficient balance for ${plan.name} Plan.`, "error");
    return;
  }

  const updatedBalance = userBalance - plan.price;

  db.ref("users/" + currentUser.uid).update({
    balance: updatedBalance
  }).then(() => {
    return db.ref("investments/" + currentUser.uid + "/" + planId).set({
      planId: plan.id,
      planName: plan.name,
      price: plan.price,
      percent: plan.percent,
      startedAt: Date.now()
    });
  }).then(() => {
    notify(`${plan.name} Plan activated successfully.`, "success");
  }).catch(err => {
    notify(err.message, "error");
  });
}

// =========================
// RECEIVE
// =========================
function receiveProfit(planId){
  db.ref("investments/" + currentUser.uid + "/" + planId)
    .once("value")
    .then(snap => {

      const inv = snap.val();
      if(!inv) return;

      const payout = inv.price + (inv.price * inv.percent / 100);
      const updatedBalance = userBalance + payout;

      return db.ref("users/" + currentUser.uid).update({
        balance: updatedBalance
      }).then(() => {
        return db.ref("investments/" + currentUser.uid + "/" + planId).remove();
      }).then(() => {
        notify(`Profit received! $${payout.toFixed(2)} added.`, "success");
      });

    }).catch(err => {
      notify(err.message, "error");
    });
}

// =========================
// AUTH
// =========================
auth.onAuthStateChanged(user => {
  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  loadUserData(user.uid);
});

// =========================
// LIVE TIMER
// =========================
setInterval(() => {
  if(currentUser){
    db.ref("investments/" + currentUser.uid)
      .once("value")
      .then(snap => {
        renderPlans(snap.val() || {});
      });
  }
}, 1000);
</script>

</body>
</html>
