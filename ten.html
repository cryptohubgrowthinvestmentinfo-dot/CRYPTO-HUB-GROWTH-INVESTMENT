<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Investment Plans | CRYPTO HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:#071422;
  color:#fff;
}

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:#0d1f33;
  color:#00d9ff;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0b1a2b;
  color:#ffd700;
  flex-wrap:wrap;
}

.nav a{
  color:#00d9ff;
  text-decoration:none;
  margin-left:15px;
  font-weight:600;
}

.container{
  padding:20px;
  max-width:1300px;
  margin:auto;
}

.note{
  text-align:center;
  margin-bottom:15px;
  color:#c9d6f2;
  line-height:1.6;
}

.msg{
  text-align:center;
  margin:15px 0;
  min-height:25px;
  font-weight:600;
}

.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-top:20px;
}

.card{
  background:#0f2238;
  border:1px solid #1d3a5c;
  padding:20px;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:#00d9ff;
}

.title{
  font-size:20px;
  color:#00d9ff;
  font-weight:700;
}

.price{
  font-size:24px;
  margin:10px 0;
  font-weight:700;
}

.detail{
  margin:8px 0;
  color:#c9d6f2;
}

.timer{
  color:#ffcc00;
  margin:12px 0;
  font-weight:700;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#00d9ff;
  color:#000;
  font-size:15px;
}

.btn:hover:not(:disabled){
  background:#fff;
}

.btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

footer{
  text-align:center;
  padding:15px;
  margin-top:30px;
  color:#c9d6f2;
  background:#0b1a2b;
}
</style>
</head>

<body>

<header>CRYPTO HUB GROWTH INVESTMENT</header>

<div class="topbar">
  <div id="balance">Balance: $0.00</div>

  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">

  <div class="note">
    Minimum investment starts at $10.<br>
    Each plan increases by $25.<br>
    Each plan runs for 24 hours.<br>
    Higher plans earn higher ROI.
  </div>

  <div class="msg" id="msg"></div>

  <div class="plans" id="plans"></div>

</div>

<footer>
  © 2026 CRYPTO HUB GROWTH INVESTMENT
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
  authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
  databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crypto-hub-growth-invest-9492c",
  storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
  messagingSenderId: "946872117732",
  appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
  measurementId: "G-CLET27VD7J"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let balance = 0;

/* ================= INVESTMENT PLANS ================= */
const plans = [
  {id:1,name:"Starter",price:10,roi:10},
  {id:2,name:"Bronze",price:35,roi:12},
  {id:3,name:"Silver",price:60,roi:14},
  {id:4,name:"Gold",price:85,roi:16},
  {id:5,name:"Platinum",price:110,roi:18},
  {id:6,name:"Diamond",price:135,roi:20},
  {id:7,name:"Elite",price:160,roi:25}
];

/* ================= NOTIFICATIONS ================= */
function notify(msg,color="#00ff88"){
  const m = document.getElementById("msg");
  m.style.color = color;
  m.innerText = msg;

  clearTimeout(window.notifyTimer);

  window.notifyTimer = setTimeout(()=>{
    m.innerText = "";
  },4000);
}

/* ================= TIMER FORMAT ================= */
function format(ms){
  if(ms <= 0) return "Profit Ready";

  let h = Math.floor(ms / 3600000);
  let m = Math.floor((ms % 3600000) / 60000);
  let s = Math.floor((ms % 60000) / 1000);

  return `${h}h ${m}m ${s}s`;
}

/* ================= BALANCE SYNC ================= */
function loadBalance(uid){
  db.ref("users/" + uid).on("value", snap => {

    balance = Number(snap.val()?.balance || 0);

    document.getElementById("balance").innerText =
      "Balance: $" + balance.toFixed(2);

  });
}

/* ================= RENDER PLANS ================= */
function render(uid,data={}){

  const box = document.getElementById("plans");
  box.innerHTML = "";

  plans.forEach(p => {

    let inv = data[p.id];

    let btnText = "Invest";
    let disabled = false;
    let timer = "24H";

    if(inv){

      const remaining = (inv.time + 86400000) - Date.now();

      if(remaining <= 0){
        btnText = "Receive";
        timer = "Profit Ready";
      }else{
        btnText = "Running";
        disabled = true;
        timer = format(remaining);
      }
    }

    const totalReturn = p.price + (p.price * p.roi / 100);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${p.name} Plan</div>
      <div class="price">$${p.price}</div>

      <div class="detail">ROI: ${p.roi}% after 24H</div>

      <div class="detail">
        Return After 24H: $${totalReturn.toFixed(2)}
      </div>

      <div class="timer">${timer}</div>

      <button class="btn" ${disabled ? "disabled" : ""}>
        ${btnText}
      </button>
    `;

    const btn = card.querySelector("button");

    if(btnText === "Invest"){
      btn.onclick = () => invest(uid,p);
    }

    if(btnText === "Receive"){
      btn.onclick = () => receive(uid,p,inv);
    }

    box.appendChild(card);

  });
}

/* ================= INVEST ================= */
function invest(uid,p){

  if(balance < p.price){
    notify("Insufficient balance","#ff4444");
    return;
  }

  db.ref("investments/" + uid + "/" + p.id)
    .once("value")
    .then(snapshot => {

      if(snapshot.exists()){
        notify("Plan already active","#ff4444");
        return;
      }

      const newBalance = balance - p.price;

      return db.ref("users/" + uid).update({
        balance:newBalance
      }).then(()=>{

        return db.ref("investments/" + uid + "/" + p.id).set({
          amount:p.price,
          roi:p.roi,
          time:Date.now()
        });

      }).then(()=>{

        notify(`${p.name} Plan activated successfully`);

      });

    });
}

/* ================= RECEIVE ================= */
function receive(uid,p,inv){

  const payout = inv.amount + (inv.amount * p.roi / 100);

  db.ref("users/" + uid)
    .once("value")
    .then(snap => {

      const currentBalance = Number(snap.val()?.balance || 0);

      return db.ref("users/" + uid).update({
        balance: currentBalance + payout
      });

    })
    .then(() => {

      return db.ref("investments/" + uid + "/" + p.id).remove();

    })
    .then(() => {

      notify(
        `Received $${payout.toFixed(2)} from ${p.name} Plan`
      );

    });
}

/* ================= AUTH ================= */
auth.onAuthStateChanged(u => {

  if(!u){
    window.location.href = "login.html";
    return;
  }

  user = u;

  loadBalance(u.uid);

  db.ref("investments/" + u.uid).on("value", snap => {

    render(u.uid, snap.val() || {});

  });

});

/* ================= LIVE TIMER ================= */
setInterval(()=>{

  if(user){

    db.ref("investments/" + user.uid)
      .once("value")
      .then(snap => {

        render(user.uid, snap.val() || {});

      });

  }

},1000);

</script>

</body>
  </html>
