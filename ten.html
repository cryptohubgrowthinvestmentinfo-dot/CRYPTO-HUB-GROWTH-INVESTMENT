<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRYPTO HUB INVESTMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#071422;
  color:#fff;
}

header{
  background:#0d1f33;
  color:#00d9ff;
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:700;
}

.topbar{
  background:#0b1a2b;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  flex-wrap:wrap;
}

.balance{
  color:#ffd700;
  font-size:18px;
  font-weight:700;
}

.nav{
  display:flex;
  gap:15px;
}

.nav a{
  color:#00d9ff;
  text-decoration:none;
  font-weight:600;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.note{
  background:#10253f;
  padding:15px;
  border-radius:12px;
  text-align:center;
  line-height:1.8;
  color:#c9d6f2;
  margin-bottom:20px;
}

.msg{
  text-align:center;
  margin-bottom:15px;
  font-weight:600;
  min-height:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#0f2238;
  border:1px solid #1d3a5c;
  border-radius:16px;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#00d9ff;
}

.title{
  color:#00d9ff;
  font-size:22px;
  font-weight:700;
}

.price{
  font-size:28px;
  font-weight:700;
  margin:10px 0;
}

.detail{
  margin:8px 0;
  color:#c9d6f2;
}

.timer{
  margin-top:12px;
  color:#ffcc00;
  font-weight:700;
}

.btn{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00d9ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover:not(:disabled){
  background:#fff;
}

.btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.section-title{
  margin:30px 0 15px;
  color:#00d9ff;
  font-size:22px;
}

.active-card{
  background:#10253f;
  border-left:5px solid #00d9ff;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
}

.active-card h3{
  margin-bottom:10px;
  color:#00d9ff;
}

footer{
  background:#0b1a2b;
  text-align:center;
  padding:15px;
  margin-top:30px;
  color:#c9d6f2;
}

</style>
</head>

<body>

<header>
  CRYPTO HUB GROWTH INVESTMENT
</header>

<div class="topbar">

  <div class="balance" id="balance">
    Balance: $0.00
  </div>

  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
  </div>

</div>

<div class="container">

  <div class="note">
    Minimum investment starts at $10.<br>
    Each investment runs for 24 Hours.<br>
    Higher plans earn higher ROI returns.
  </div>

  <div class="msg" id="msg"></div>

  <div class="grid" id="plans"></div>

  <h2 class="section-title">
    Active Investments
  </h2>

  <div id="activeInvestments"></div>

</div>

<footer>
  © 2026 CRYPTO HUB GROWTH INVESTMENT
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
  authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
  databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crypto-hub-growth-invest-9492c",
  storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
  messagingSenderId: "946872117732",
  appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
  measurementId: "G-CLET27VD7J"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentBalance = 0;

/* ================= PLANS ================= */

const plans = [

{
  id:1,
  name:"Starter",
  metal:"Copper",
  price:10,
  roi:10
},

{
  id:2,
  name:"Bronze",
  metal:"Bronze",
  price:35,
  roi:12
},

{
  id:3,
  name:"Silver",
  metal:"Silver",
  price:60,
  roi:14
},

{
  id:4,
  name:"Gold",
  metal:"Gold",
  price:85,
  roi:16
},

{
  id:5,
  name:"Platinum",
  metal:"Platinum",
  price:110,
  roi:18
},

{
  id:6,
  name:"Diamond",
  metal:"Diamond",
  price:135,
  roi:20
}

];

/* ================= NOTIFY ================= */

function notify(msg,color="#00ff88"){

  const box = document.getElementById("msg");

  box.style.color = color;
  box.innerText = msg;

  clearTimeout(window.notifyTimer);

  window.notifyTimer = setTimeout(()=>{
    box.innerText = "";
  },4000);

}

/* ================= BALANCE ================= */

function loadBalance(uid){

  db.ref("users/" + uid)
  .on("value",snap=>{

    currentBalance =
      Number(snap.val()?.balance || 0);

    document.getElementById("balance")
    .innerText =
      "Balance: $" +
      currentBalance.toFixed(2);

  });

}

/* ================= RENDER PLANS ================= */

function renderPlans(uid,data={}){

  const container =
    document.getElementById("plans");

  container.innerHTML = "";

  plans.forEach(plan=>{

    const inv = data[plan.id];

    let buttonText = "Invest";
    let disabled = false;

    if(inv){

      const remaining =
        (inv.time + 86400000)
        - Date.now();

      if(remaining <= 0){

        buttonText = "Receive";

      }else{

        buttonText = "Running";
        disabled = true;

      }

    }

    const total =
      plan.price +
      (plan.price * plan.roi / 100);

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <div class="title">
        ${plan.name} Plan
      </div>

      <div class="detail">
        Metal Used:
        ${plan.metal}
      </div>

      <div class="price">
        $${plan.price}
      </div>

      <div class="detail">
        ROI:
        ${plan.roi}% after 24 Hours
      </div>

      <div class="detail">
        Expected Return:
        $${total.toFixed(2)}
      </div>

      <div class="timer">
        Duration: 24H
      </div>

      <button class="btn"
        ${disabled ? "disabled" : ""}>
        ${buttonText}
      </button>

    `;

    const btn =
      card.querySelector("button");

    if(buttonText === "Invest"){
      btn.onclick = ()=>invest(uid,plan);
    }

    if(buttonText === "Receive"){
      btn.onclick = ()=>receive(uid,plan,inv);
    }

    container.appendChild(card);

  });

}

/* ================= ACTIVE ================= */

function renderActive(data={}){

  const container =
    document.getElementById(
      "activeInvestments"
    );

  container.innerHTML = "";

  const keys = Object.keys(data);

  if(keys.length === 0){

    container.innerHTML = `
      <div class="active-card">
        No active investments
      </div>
    `;

    return;
  }

  keys.forEach(key=>{

    const inv = data[key];

    const total =
      inv.amount +
      (inv.amount * inv.roi / 100);

    const div =
      document.createElement("div");

    div.className = "active-card";

    div.innerHTML = `

      <h3>${inv.plan}</h3>

      <p>
        Amount:
        $${inv.amount}
      </p>

      <p>
        ROI:
        ${inv.roi}%
      </p>

      <p>
        Return:
        $${total.toFixed(2)}
      </p>

      <p class="timer">
        Duration: 24H
      </p>

    `;

    container.appendChild(div);

  });

}

/* ================= INVEST ================= */

function invest(uid,plan){

  if(currentBalance < plan.price){

    notify(
      "Insufficient balance",
      "#ff4444"
    );

    return;
  }

  db.ref(
    "investments/" +
    uid + "/" +
    plan.id
  )
  .once("value")

  .then(snapshot=>{

    if(snapshot.exists()){

      notify(
        "Plan already active",
        "#ff4444"
      );

      return;
    }

    const newBalance =
      currentBalance - plan.price;

    return db.ref("users/" + uid)
    .update({
      balance:newBalance
    })

    .then(()=>{

      return db.ref(
        "investments/" +
        uid + "/" +
        plan.id
      )
      .set({

        plan:plan.name,
        amount:plan.price,
        roi:plan.roi,
        time:Date.now()

      });

    })

    .then(()=>{

      notify(
        plan.name +
        " Plan activated successfully"
      );

    });

  });

}

/* ================= RECEIVE ================= */

function receive(uid,plan,inv){

  const payout =
    inv.amount +
    (inv.amount * plan.roi / 100);

  db.ref("users/" + uid)
  .once("value")

  .then(snap=>{

    const current =
      Number(
        snap.val()?.balance || 0
      );

    return db.ref("users/" + uid)
    .update({
      balance: current + payout
    });

  })

  .then(()=>{

    return db.ref(
      "investments/" +
      uid + "/" +
      plan.id
    ).remove();

  })

  .then(()=>{

    notify(
      "Received $" +
      payout.toFixed(2)
    );

  });

}

/* ================= AUTH ================= */

auth.onAuthStateChanged(user=>{

  if(!user){

    location.href = "login.html";
    return;
  }

  currentUser = user;

  loadBalance(user.uid);

  db.ref("investments/" + user.uid)
  .on("value",snap=>{

    const data =
      snap.val() || {};

    renderPlans(user.uid,data);

    renderActive(data);

  });

});

</script>

</body>
</html>
