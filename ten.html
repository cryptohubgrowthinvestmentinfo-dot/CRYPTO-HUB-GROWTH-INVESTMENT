<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRYPTO HUB GROWTH INVESTMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#071422;
  color:#fff;
}

header{
  background:#0d1f33;
  color:#00d9ff;
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:700;
}

.topbar{
  background:#0b1a2b;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  flex-wrap:wrap;
  gap:10px;
}

.balance{
  color:#ffd700;
  font-size:18px;
  font-weight:700;
}

.nav{
  display:flex;
  gap:15px;
}

.nav a{
  color:#00d9ff;
  text-decoration:none;
  font-weight:600;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.note{
  background:#10253f;
  padding:15px;
  border-radius:12px;
  text-align:center;
  line-height:1.8;
  color:#c9d6f2;
  margin-bottom:20px;
}

.msg{
  text-align:center;
  margin-bottom:15px;
  font-weight:600;
  min-height:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#0f2238;
  border:1px solid #1d3a5c;
  border-radius:16px;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#00d9ff;
}

.title{
  color:#00d9ff;
  font-size:22px;
  font-weight:700;
}

.price{
  font-size:28px;
  font-weight:700;
  margin:10px 0;
}

.detail{
  margin:8px 0;
  color:#c9d6f2;
  line-height:1.7;
}

.timer{
  margin-top:12px;
  color:#ffcc00;
  font-weight:700;
}

.btn{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00d9ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover:not(:disabled){
  background:#fff;
}

.btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.section-title{
  margin:30px 0 15px;
  color:#00d9ff;
  font-size:22px;
}

.active-card{
  background:#10253f;
  border-left:5px solid #00d9ff;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
}

.active-card h3{
  margin-bottom:10px;
  color:#00d9ff;
}

footer{
  background:#0b1a2b;
  text-align:center;
  padding:15px;
  margin-top:30px;
  color:#c9d6f2;
}

@media(max-width:768px){

  .topbar{
    flex-direction:column;
    text-align:center;
  }

}

</style>
</head>

<body>

<header>
  CRYPTO HUB GROWTH INVESTMENT
</header>

<div class="topbar">

  <div class="balance" id="balance">
    Total Balance: $0.00
  </div>

  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
  </div>

</div>

<div class="container">

  <div class="note">
    Minimum investment starts at $10.<br>
    Every next plan increases by $25.<br>
    All plans run for 24 hours.<br>
    Higher plans earn higher ROI percentages.
  </div>

  <div class="msg" id="msg"></div>

  <div class="grid" id="plans"></div>

  <h2 class="section-title">
    Active Investments
  </h2>

  <div id="activeInvestments"></div>

</div>

<footer>
  © 2026 CRYPTO HUB GROWTH INVESTMENT
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
  authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
  databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crypto-hub-growth-invest-9492c",
  storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
  messagingSenderId: "946872117732",
  appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
  measurementId: "G-CLET27VD7J"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentBalance = 0;

/* ================= INVESTMENT PLANS ================= */

const plans = [

{
  id:1,
  name:"Starter Plan",
  price:10,
  roi:20
},

{
  id:2,
  name:"Bronze Plan",
  price:35,
  roi:25
},

{
  id:3,
  name:"Silver Plan",
  price:60,
  roi:30
},

{
  id:4,
  name:"Gold Plan",
  price:85,
  roi:35
},

{
  id:5,
  name:"Platinum Plan",
  price:110,
  roi:40
},

{
  id:6,
  name:"Diamond Plan",
  price:135,
  roi:45
},

{
  id:7,
  name:"Elite Plan",
  price:160,
  roi:50
}

];

/* ================= NOTIFICATION ================= */

function notify(message,color="#00ff88"){

  const msg =
    document.getElementById("msg");

  msg.style.color = color;
  msg.innerText = message;

  clearTimeout(window.notifyTimer);

  window.notifyTimer = setTimeout(()=>{
    msg.innerText = "";
  },4000);

}

/* ================= BALANCE SYNC ================= */

function syncBalance(uid){

  db.ref("users/" + uid)
  .on("value",snap=>{

    const userData =
      snap.val() || {};

    currentBalance =
      Number(userData.balance || 0);

    document.getElementById("balance")
    .innerText =
      "Total Balance: $" +
      currentBalance.toFixed(2);

  });

}

/* ================= FORMAT TIMER ================= */

function formatTime(ms){

  if(ms <= 0){
    return "Profit Ready";
  }

  const hours =
    Math.floor(ms / 3600000);

  const minutes =
    Math.floor((ms % 3600000) / 60000);

  const seconds =
    Math.floor((ms % 60000) / 1000);

  return `${hours}h ${minutes}m ${seconds}s`;

}

/* ================= RENDER PLANS ================= */

function renderPlans(uid,data={}){

  const container =
    document.getElementById("plans");

  container.innerHTML = "";

  plans.forEach(plan=>{

    const investment =
      data[String(plan.id)];

    let buttonText = "Invest";
    let disabled = false;

    let timerText =
      "24 Hours";

    if(
      investment &&
      investment.amount &&
      investment.roi &&
      investment.time
    ){

      const remaining =
        (investment.time + 86400000)
        - Date.now();

      if(remaining <= 0){

        buttonText = "Receive";
        timerText = "Profit Ready";

      }else{

        buttonText = "Running";
        disabled = true;

        timerText =
          formatTime(remaining);

      }

    }

    const expectedReturn =
      plan.price +
      (plan.price * plan.roi / 100);

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <div class="title">
        ${plan.name}
      </div>

      <div class="price">
        $${plan.price}
      </div>

      <div class="detail">
        ROI:
        ${plan.roi}%<br>

        Duration:
        24 Hours<br>

        Expected Return:
        $${expectedReturn.toFixed(2)}
      </div>

      <div class="timer">
        ${timerText}
      </div>

      <button class="btn"
      ${disabled ? "disabled" : ""}>
        ${buttonText}
      </button>

    `;

    const btn =
      card.querySelector("button");

    if(buttonText === "Invest"){
      btn.onclick =
        ()=>invest(uid,plan);
    }

    if(buttonText === "Receive"){
      btn.onclick =
        ()=>receive(uid,plan,investment);
    }

    container.appendChild(card);

  });

}

/* ================= ACTIVE INVESTMENTS ================= */

function renderActive(data={}){

  const container =
    document.getElementById(
      "activeInvestments"
    );

  container.innerHTML = "";

  const validInvestments =
    Object.values(data).filter(inv =>
      inv &&
      inv.plan &&
      inv.amount &&
      inv.roi &&
      inv.time
    );

  if(validInvestments.length === 0){

    container.innerHTML = `

      <div class="active-card">
        No active investments
      </div>

    `;

    return;
  }

  validInvestments.forEach(inv=>{

    const total =
      inv.amount +
      (inv.amount * inv.roi / 100);

    const remaining =
      (inv.time + 86400000)
      - Date.now();

    const div =
      document.createElement("div");

    div.className = "active-card";

    div.innerHTML = `

      <h3>${inv.plan}</h3>

      <p>
        Invested:
        $${inv.amount}
      </p>

      <p>
        ROI:
        ${inv.roi}%
      </p>

      <p>
        Total Return:
        $${total.toFixed(2)}
      </p>

      <p class="timer">
        ${remaining <= 0
          ? "Profit Ready"
          : formatTime(remaining)}
      </p>

    `;

    container.appendChild(div);

  });

}

/* ================= INVEST ================= */

function invest(uid,plan){

  if(currentBalance < plan.price){

    notify(
      "Insufficient balance",
      "#ff4444"
    );

    return;
  }

  const investRef =
    db.ref(
      "investments/" +
      uid + "/" +
      plan.id
    );

  investRef.once("value")
  .then(snapshot=>{

    const existing =
      snapshot.val();

    if(
      existing &&
      existing.amount &&
      existing.roi &&
      existing.time
    ){

      const remaining =
        (existing.time + 86400000)
        - Date.now();

      if(remaining > 0){

        notify(
          "Plan already active",
          "#ff4444"
        );

        return;
      }

    }

    const newBalance =
      currentBalance - plan.price;

    return db.ref("users/" + uid)
    .update({

      balance:newBalance,
      totalBalance:newBalance

    })

    .then(()=>{

      return investRef.set({

        plan:plan.name,
        amount:plan.price,
        roi:plan.roi,
        time:Date.now()

      });

    })

    .then(()=>{

      notify(
        plan.name +
        " activated successfully"
      );

    });

  });

}

/* ================= RECEIVE ================= */

function receive(uid,plan,investment){

  if(
    !investment ||
    !investment.amount ||
    !investment.roi
  ){
    return;
  }

  const payout =
    investment.amount +
    (investment.amount *
    investment.roi / 100);

  db.ref("users/" + uid)
  .once("value")

  .then(snap=>{

    const current =
      Number(
        snap.val()?.balance || 0
      );

    const updatedBalance =
      current + payout;

    return db.ref("users/" + uid)
    .update({

      balance:updatedBalance,
      totalBalance:updatedBalance

    });

  })

  .then(()=>{

    return db.ref(
      "investments/" +
      uid + "/" +
      plan.id
    ).remove();

  })

  .then(()=>{

    notify(
      "Profit received successfully",
      "#00ff88"
    );

  });

}

/* ================= CLEAN INVALID DATA ================= */

function cleanInvalidInvestments(uid,data={}){

  Object.keys(data).forEach(key=>{

    const inv = data[key];

    if(
      !inv ||
      !inv.plan ||
      !inv.amount ||
      !inv.roi ||
      !inv.time
    ){

      db.ref(
        "investments/" +
        uid + "/" +
        key
      ).remove();

    }

  });

}

/* ================= AUTH ================= */

auth.onAuthStateChanged(user=>{

  if(!user){

    location.href = "login.html";
    return;
  }

  currentUser = user;

  syncBalance(user.uid);

  db.ref(
    "investments/" +
    user.uid
  )
  .on("value",snap=>{

    const data =
      snap.val() || {};

    cleanInvalidInvestments(
      user.uid,
      data
    );

    renderPlans(
      user.uid,
      data
    );

    renderActive(data);

  });

});

/* ================= LIVE TIMER ================= */

setInterval(()=>{

  if(currentUser){

    db.ref(
      "investments/" +
      currentUser.uid
    )
    .once("value")
    .then(snap=>{

      const data =
        snap.val() || {};

      renderPlans(
        currentUser.uid,
        data
      );

      renderActive(data);

    });

  }

},1000);

</script>

</body>
  </html>
