<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposit Funds | CRYPTO HUB GROWTH INVESTMENT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #071426, #0d1f3c, #122b52);
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .header {
      text-align: center;
      padding: 35px 20px 15px;
    }

    .header h1 {
      color: #00d9ff;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .header p {
      color: #d6e4ff;
      margin-top: 8px;
      font-size: 1rem;
    }

    .live-status {
      text-align: center;
      margin: 0 auto 20px;
      padding: 10px 18px;
      color: #00d9ff;
      background: rgba(0,217,255,0.08);
      border-radius: 12px;
      font-weight: 600;
      width: fit-content;
    }

    .deposit-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    .deposit-box {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 45px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.35);
    }

    .deposit-box h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 15px;
      color: white;
    }

    .deposit-box p {
      text-align: center;
      color: #d6e4ff;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      color: #d6e4ff;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .input-group input {
      width: 100%;
      padding: 16px;
      border: none;
      outline: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .input-group input::placeholder {
      color: #c7d8f7;
    }

    .input-group input:focus {
      border: 1px solid #00d9ff;
      background: rgba(255,255,255,0.18);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 30px;
      background: #00d9ff;
      color: #071426;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 25px rgba(0,217,255,0.3);
    }

    .btn:hover {
      background: white;
      transform: translateY(-2px);
    }

    .message {
      text-align: center;
      margin-top: 18px;
      color: #d6e4ff;
      font-size: 0.95rem;
      min-height: 24px;
    }

    .nav-link {
      text-align: center;
      margin-top: 20px;
    }

    .nav-link a {
      color: #00d9ff;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 22px;
      background: rgba(0,0,0,0.25);
      color: #c9d6f2;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .deposit-box {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .deposit-box h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>CRYPTO HUB GROWTH INVESTMENT</h1>
    <p>Securely fund your investment wallet</p>
  </div>

  <!-- Live Status -->
  <div class="live-status" id="liveStatus">
    Connecting to secure real-time database...
  </div>

  <!-- Deposit Section -->
  <section class="deposit-section">
    <div class="deposit-box">
      <h2>Deposit Funds</h2>
      <p>Enter your preferred deposit amount to continue your secure investment journey.</p>

      <form id="depositForm">
        <div class="input-group">
          <label for="amount">Enter Amount (USD)</label>
          <input 
            type="number" 
            id="amount" 
            placeholder="Enter deposit amount" 
            min="1" 
            required
          />
        </div>

        <button type="submit" class="btn">Continue</button>

        <div class="message" id="depositMessage"></div>
      </form>

      <div class="nav-link">
        <a href="dashboard.html">← Back to Dashboard</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2026 CRYPTO HUB GROWTH INVESTMENT | Secure Deposit Portal
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      push,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
      authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
      databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "crypto-hub-growth-invest-9492c",
      storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
      messagingSenderId: "946872117732",
      appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
      measurementId: "G-CLET27VD7J"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Live Status
    document.getElementById("liveStatus").innerText = "Secure real-time database connected.";

    // User Session
    const userId = localStorage.getItem("cryptoHubUserId");

    if (!userId) {
      window.location.href = "login.html";
    }

    // Deposit Form
    const depositForm = document.getElementById("depositForm");
    const depositMessage = document.getElementById("depositMessage");

    depositForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const amount = parseFloat(document.getElementById("amount").value);

      if (!amount || amount <= 0) {
        depositMessage.innerText = "Please enter a valid deposit amount.";
        return;
      }

      depositMessage.innerText = "Processing secure deposit...";

      try {
        // Current user balance
        const userRef = ref(database, "users/" + userId);
        const snapshot = await get(userRef);

        let currentBalance = 0;

        if (snapshot.exists()) {
          const userData = snapshot.val();
          currentBalance = parseFloat(
            (userData.totalBalance || "$0").replace("$", "").replace(/,/g, "")
          ) || 0;
        }

        const newBalance = currentBalance + amount;

        // Update user balance
        await update(userRef, {
          totalBalance: `$${newBalance.toLocaleString()}`
        });

        // Create transaction
        const transactionRef = push(ref(database, "transactions/" + userId));

        await set(transactionRef, {
          type: "deposit",
          amount: amount,
          status: "completed",
          timestamp: Date.now()
        });

        depositMessage.innerText = `Deposit successful. New Balance: $${newBalance.toLocaleString()}`;

        // Reset form
        depositForm.reset();

        // Redirect
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1800);

      } catch (error) {
        depositMessage.innerText = error.message;
      }
    });
  </script>

</body>
  </html>
