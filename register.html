<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CRYPTO HUB GROWTH INVESTMENT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #071426, #0d1f3c, #122b52);
      display: flex;
      flex-direction: column;
      color: white;
    }

    a {
      text-decoration: none;
    }

    .header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .header h1 {
      color: #00d9ff;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .header p {
      color: #d6e4ff;
      margin-top: 8px;
      font-size: 1rem;
    }

    .live-status {
      text-align: center;
      margin: 0 auto 15px;
      padding: 10px 18px;
      color: #00d9ff;
      background: rgba(0,217,255,0.08);
      border-radius: 12px;
      font-weight: 600;
      width: fit-content;
    }

    .register-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    .register-box {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .register-box h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      color: white;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #d6e4ff;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1rem;
      transition: 0.3s;
    }

    .input-group input::placeholder {
      color: #c7d8f7;
    }

    .input-group input:focus {
      background: rgba(255,255,255,0.18);
      border: 1px solid #00d9ff;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      background: #00d9ff;
      color: #071426;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.3);
    }

    .btn:hover {
      background: white;
      transform: translateY(-2px);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.95rem;
      color: #d6e4ff;
      min-height: 24px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #d6e4ff;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #00d9ff;
      font-weight: 600;
      margin-left: 5px;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.25);
      color: #c9d6f2;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .register-box {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .register-box h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>CRYPTO HUB GROWTH INVESTMENT</h1>
    <p>Create your secure investment account today</p>
  </div>

  <!-- Live Status -->
  <div class="live-status" id="liveStatus">
    Connecting to secure real-time database...
  </div>

  <!-- Register Section -->
  <section class="register-section">
    <div class="register-box">
      <h2>Create Account</h2>

      <form id="registerForm">
        <div class="input-group">
          <label for="username">1. User Name</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
          <label for="fullname">2. Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
          <label for="gmail">3. Gmail</label>
          <input type="email" id="gmail" placeholder="Enter your Gmail address" required>
        </div>

        <div class="input-group">
          <label for="password">4. Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="input-group">
          <label for="confirm-password">5. Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn">Create Account</button>

        <div class="message" id="registerMessage"></div>
      </form>

      <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2026 CRYPTO HUB GROWTH INVESTMENT | Secure Registration Portal
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getDatabase,
      ref,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
      authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
      databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "crypto-hub-growth-invest-9492c",
      storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
      messagingSenderId: "946872117732",
      appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
      measurementId: "G-CLET27VD7J"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Database Status
    document.getElementById("liveStatus").innerText =
      "Secure real-time database connected.";

    // Elements
    const registerForm = document.getElementById("registerForm");
    const registerMessage = document.getElementById("registerMessage");

    // Register
    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const fullName = document.getElementById("fullname").value.trim();
      const email = document.getElementById("gmail").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      // Validation
      if (password !== confirmPassword) {
        registerMessage.innerText = "Passwords do not match.";
        return;
      }

      if (password.length < 6) {
        registerMessage.innerText =
          "Password must be at least 6 characters.";
        return;
      }

      registerMessage.innerText =
        "Creating secure investment account...";

      try {
        // Firebase Auth Registration
        const userCredential =
          await createUserWithEmailAndPassword(
            auth,
            email,
            password
          );

        const user = userCredential.user;

        // Dashboard Ready Data
        await set(ref(database, "users/" + user.uid), {
          uid: user.uid,
          userName: username,
          fullName: fullName,
          gmail: email,

          // Dashboard Stats
          totalBalance: "$0",
          activeInvestment: "$0",
          totalProfit: "$0",

          // Account Status
          currentPlan: "Starter Plan",
          roi: "5% ROI",
          investorStatus: "Verified Investor",
          accountLevel: "Starter",

          // Financial Records
          totalDeposits: "$0",
          totalWithdrawals: "$0",

          // Bonuses
          welcomeBonus: "$0",
          referralBonus: "$0",

          // Metadata
          createdAt: Date.now(),
          lastLogin: Date.now()
        });

        // Transaction Base
        await set(ref(database, "transactions/" + user.uid), {
          initialized: true,
          createdAt: Date.now()
        });

        // Notification Base
        await set(ref(database, "notifications/" + user.uid), {
          welcomeMessage:
            "Welcome to CRYPTO HUB GROWTH INVESTMENT",
          accountStatus:
            "Your account has been created successfully.",
          createdAt: Date.now()
        });

        // Save Session
        localStorage.setItem(
          "cryptoHubUserId",
          user.uid
        );
