<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CRYPTO HUB GROWTH INVESTMENT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #071426, #0d1f3c, #122b52);
      display: flex;
      flex-direction: column;
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .header {
      text-align: center;
      padding: 40px 20px 15px;
    }

    .header h1 {
      color: #00d9ff;
      font-size: 2.3rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .header p {
      color: #d6e4ff;
      margin-top: 8px;
      font-size: 1rem;
    }

    .live-status {
      text-align: center;
      color: #00d9ff;
      font-weight: 600;
      padding: 10px;
      margin: 0 auto 15px;
      width: fit-content;
      background: rgba(0,217,255,0.08);
      border-radius: 12px;
    }

    .login-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 450px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .login-box h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 30px;
      color: white;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #d6e4ff;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1rem;
      transition: 0.3s;
    }

    .input-group input::placeholder {
      color: #c7d8f7;
    }

    .input-group input:focus {
      background: rgba(255,255,255,0.18);
      border: 1px solid #00d9ff;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      background: #00d9ff;
      color: #071426;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.3);
      margin-top: 10px;
    }

    .btn:hover {
      background: white;
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.95rem;
      color: #d6e4ff;
      min-height: 22px;
    }

    .register-link {
      text-align: center;
      margin-top: 18px;
      color: #d6e4ff;
      font-size: 0.95rem;
    }

    .register-link a {
      color: #00d9ff;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.25);
      color: #c9d6f2;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .login-box {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 1.9rem;
      }

      .login-box h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>CRYPTO HUB GROWTH INVESTMENT</h1>
    <p>Securely access your investment account</p>
  </div>

  <div class="live-status" id="liveStatus">
    Connecting to secure real-time database...
  </div>

  <section class="login-section">
    <div class="login-box">
      <h2>Login</h2>

      <form id="loginForm">
        <div class="input-group">
          <label for="gmail">Gmail</label>
          <input type="email" id="gmail" placeholder="Enter your Gmail address" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn" id="loginBtn">Login</button>

        <div class="message" id="loginMessage"></div>
      </form>

      <div class="register-link">
        Don’t have an account?
        <a href="register.html">Register</a>
      </div>
    </div>
  </section>

  <footer>
    © 2026 CRYPTO HUB GROWTH INVESTMENT | Secure Login Portal
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getDatabase,
      ref,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDoE3JXF_ggmLS_MNO0xYE0uykuAlj0Mdk",
      authDomain: "crypto-hub-growth-invest-9492c.firebaseapp.com",
      databaseURL: "https://crypto-hub-growth-invest-9492c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "crypto-hub-growth-invest-9492c",
      storageBucket: "crypto-hub-growth-invest-9492c.firebasestorage.app",
      messagingSenderId: "946872117732",
      appId: "1:946872117732:web:c6ba0ca8c1510bf902bff1",
      measurementId: "G-CLET27VD7J"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // DOM Elements
    const liveStatus = document.getElementById("liveStatus");
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const loginBtn = document.getElementById("loginBtn");

    // Database Connection Status
    liveStatus.innerText = "Secure real-time database connected.";

    // IMPORTANT:
    // User stays on login page until credentials are submitted and verified.
    // No auto redirect before successful sign in.

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("gmail").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        loginMessage.innerText = "Please enter your Gmail and password.";
        return;
      }

      loginBtn.disabled = true;
      loginMessage.innerText = "Authenticating securely...";

      try {
        // Keep session only after successful login
        await setPersistence(auth, browserLocalPersistence);

        // Sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Verify profile exists in realtime database
        const userRef = ref(database, "users/" + user.uid);
        const snapshot = await get(userRef);

        if (!snapshot.exists()) {
          loginMessage.innerText = "Account profile not found. Please register first.";
          loginBtn.disabled = false;
          return;
        }

        // Save secure local session
        localStorage.setItem("cryptoHubUserId", user.uid);

        // Optional last login update
        await update(userRef, {
          lastLogin: Date.now()
        });

        loginMessage.innerText = "Login successful. Preparing dashboard...";

        // Give user time before redirect
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 2000);

      } catch (error) {
        switch (error.code) {
          case "auth/user-not-found":
            loginMessage.innerText = "No account found with this Gmail.";
            break;
          case "auth/wrong-password":
            loginMessage.innerText = "Incorrect password.";
            break;
          case "auth/invalid-credential":
            loginMessage.innerText = "Invalid login credentials.";
            break;
          case "auth/too-many-requests":
            loginMessage.innerText = "Too many attempts. Please try again later.";
            break;
          default:
            loginMessage.innerText = error.message;
        }

        loginBtn.disabled = false;
      }
    });
  </script>

</body>
  </html>
